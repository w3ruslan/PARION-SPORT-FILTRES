<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enfibonacci v27.2 - Profesyonel Analiz Paneli</title>
    <style>
        /* ============ AÇIK / PROFESYONEL TEMA ============ */
        :root {
            --bg: #eef1f6;
            --panel: #ffffff;
            --panel-2: #f7f9fc;
            --panel-3: #eef2f8;
            --border: #dde2ea;
            --text: #1f2a37;
            --muted: #6b7585;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --gold: #b7791f;

            --win-bg: #e8f6ee;
            --win-border: #1f9d57;
            --loss-bg: #fdecea;
            --loss-border: #dc3b2e;
            --future-bg: #e7f0ff;
            --future-border: #2563eb;
            --draw: #e0a106;
            --hl-bg: #f3e8ff;
            --hl-border: #7c3aed;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            margin: 0;
            line-height: 1.45;
        }
        .mono { font-family: 'SF Mono', 'Consolas', 'Courier New', monospace; }

        .wrapper {
            max-width: 1450px;
            margin: auto;
            border: 1px solid var(--border);
            padding: 28px;
            background: var(--panel);
            box-shadow: 0 10px 30px rgba(31, 42, 55, 0.08);
            border-radius: 14px;
        }

        h2.title {
            text-align: center;
            color: var(--text);
            font-weight: 700;
            letter-spacing: 0.3px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 14px;
            margin: 0 0 22px 0;
            font-size: 1.5em;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 18px; }
        textarea {
            width: 100%;
            height: 160px;
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            resize: vertical;
            font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 22px; border-radius: 12px; }
        .card h3 { margin: 0 0 14px 0; font-size: 1.05em; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 1em;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-radius: 8px;
            transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
        }
        button:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35); }
        button:active { transform: translateY(1px); }
        button.secondary { background: var(--gold); box-shadow: 0 2px 6px rgba(183, 121, 31, 0.25); }
        button.secondary:hover { background: #9c6717; }

        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: var(--panel-2); padding: 16px; border-radius: 10px; margin: 12px 0; border: 1px solid var(--border); }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }

        input, select {
            background: #fff;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 9px 10px;
            border-radius: 7px;
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* ============ MAÇ SATIRLARI (TEK SATIR / KOMPAKT) ============ */
        .match-row {
            border: 1px solid var(--border);
            border-left: 5px solid var(--border);
            padding: 7px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            color: var(--text);
            background: var(--panel);
            white-space: nowrap;
            transition: box-shadow 0.12s;
        }
        .match-row:hover { box-shadow: 0 2px 8px rgba(31, 42, 55, 0.10); }

        /* Renk durumları */
        .future-match { background: var(--future-bg) !important; border-color: var(--future-border) !important; border-left: 6px solid var(--future-border) !important; }
        .win { background: var(--win-bg); border-left-color: var(--win-border); }
        .loss { background: var(--loss-bg); border-left-color: var(--loss-border); }
        .draw-highlight { border-color: var(--draw) !important; box-shadow: inset 0 0 0 1px var(--draw); }

        /* Gerçek sonuç vurgulaması — sadece seçilen sonuç renklenir */
        .actual-highlight {
            background: var(--hl-bg) !important;
            border-color: var(--hl-border) !important;
            border-left: 6px solid var(--hl-border) !important;
        }

        /* Sütunlar */
        .col-teams  { flex: 2; min-width: 215px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
        .col-score  { width: 46px; text-align: center; font-weight: 700; color: var(--gold); }
        .col-goals  { flex: 1.5; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; }
        .col-dna    { width: 165px; text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0 8px; font-size: 11px; }
        .col-odds   { width: 170px; text-align: right; font-weight: 600; color: var(--primary-dark); font-size: 11px; }
        .col-status { width: 92px; text-align: center; }

        .status-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3px;
            background: rgba(31, 42, 55, 0.06);
            color: var(--muted);
            white-space: nowrap;
        }

        #log { height: 620px; overflow-y: auto; padding-right: 8px; border-top: 1px solid var(--border); margin-top: 12px; }
        #stats {
            color: var(--text);
            background: var(--panel-3);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.15em;
            font-weight: 600;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        h4 { margin: 0 0 6px 0; font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }

        .odds-filter-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            background: var(--panel-2);
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-top: 10px;
        }
        .odds-sub-group { display: flex; flex-direction: column; gap: 4px; }
        .odds-sub-group label { font-size: 10px; color: var(--primary); text-align: center; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2 class="title">🧬 ENFIBONACCI v27.2 — PROFESYONEL PANEL</h2>

    <div class="input-grid">
        <div>
            <h4>1. GEÇMİŞ MAÇLAR (Analiz Arşivi):</h4>
            <textarea id="pastInput" placeholder="Skorlu geçmiş maçları buraya yapıştırın..."></textarea>
        </div>
        <div>
            <h4>2. FİKSTÜR (Yeni Tahminler):</h4>
            <textarea id="fixtureInput" placeholder="Analiz edilecek gelecek maçları buraya yapıştırın..."></textarea>
        </div>
    </div>
    <button onclick="superParse()">📊 VERİLERİ SENTEZLE VE ANALİZ ET</button>

    <div class="grid">
        <!-- TEK PANEL: STRATEJİK FİLTRELER VE LİSTE -->
        <div class="card">
            <h3>STRATEJİK FİLTRELEME VE ANALİZ LİSTESİ</h3>

            <div class="filter-grid">
                <div class="filter-group" style="grid-column: span 2;">
                    <label>SONUÇ VURGULAMA (ODAK ANALİZİ)</label>
                    <select id="filter_focus" onchange="renderList()">
                        <option value="ALL">DNA TAHMİN ODAKLI (NORMAL)</option>
                        <option value="1">1 ODAKLI (GERÇEKTE 1 BİTENLER YEŞİL)</option>
                        <option value="X">X ODAKLI (GERÇEKTE X BİTENLER YEŞİL)</option>
                        <option value="2">2 ODAKLI (GERÇEKTE 2 BİTENLER YEŞİL)</option>
                    </select>
                </div>
            </div>

            <div class="filter-grid">
                <div class="filter-group">
                    <label>SİSTEM TAHMİNLERİ</label>
                    <select id="filter_prediction" onchange="renderList()">
                        <option value="ALL">TÜM TAHMİNLER</option>
                        <option value="1">SADECE 1</option>
                        <option value="X">SADECE X</option>
                        <option value="2">SADECE 2</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>GERÇEK SONUÇ VURGULA (HEPSİ GÖRÜNÜR)</label>
                    <select id="filter_actual" onchange="renderList()">
                        <option value="ALL">VURGULAMA YOK</option>
                        <option value="1">SADECE 1 BİTENLERİ VURGULA</option>
                        <option value="X">SADECE X BİTENLERİ VURGULA</option>
                        <option value="2">SADECE 2 BİTENLERİ VURGULA</option>
                    </select>
                </div>
            </div>

            <div class="filter-grid">
                <div class="filter-group"><label>SIRALAMA MIN</label><input type="number" id="rank_min" value="1" min="1"></div>
                <div class="filter-group"><label>SIRALAMA MAX</label><input type="number" id="rank_max" value="30" min="1"></div>
            </div>

            <!-- GELİŞMİŞ ORAN FİLTRELERİ -->
            <div class="odds-filter-container">
                <div class="odds-sub-group">
                    <label>ORAN 1 (MIN/MAX)</label>
                    <input type="number" id="f1_min" value="0.00" step="0.01">
                    <input type="number" id="f1_max" value="99.0" step="0.01">
                </div>
                <div class="odds-sub-group">
                    <label>ORAN X (MIN/MAX)</label>
                    <input type="number" id="fx_min" value="0.00" step="0.01">
                    <input type="number" id="fx_max" value="99.0" step="0.01">
                </div>
                <div class="odds-sub-group">
                    <label>ORAN 2 (MIN/MAX)</label>
                    <input type="number" id="f2_min" value="0.00" step="0.01">
                    <input type="number" id="f2_max" value="99.0" step="0.01">
                </div>
            </div>

            <button class="secondary" onclick="renderList()">FİLTRELERİ UYGULA VE LİSTEYİ GÜNCELLE</button>
            <div id="stats" style="margin-top:20px;"></div>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
let allMatches = [];
let teamSet = new Set();
let leagueTable = {};

function ultraClean(text) {
    if (!text) return "";
    return text
        .replace(/Today|Yesterday|Round|B's|1X2|Today\s\d{2}:\d{2}/g, '')
        .replace(/\d{2}\.\d{2}\.\s\d{2}:\d{2}/g, '')
        .replace(/^\.|\.$/g, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function solveRadicalDNA(o1, ox, o2, hStats, aStats, hRank, aRank) {
    let diff = Math.abs(o1 - o2);
    let puan = 0;

    if (ox <= 3.45) puan += 4;
    if (diff <= 0.85) puan += 4;
    if (ox < 3.05) puan += 2;

    if (hRank > aRank && aRank <= 5 && hStats && hStats.avgGC < 1.3) {
        puan += 1;
    }

    if (hStats && aStats && hStats.avgGC < 1.1 && aStats.avgGC < 1.1) {
        puan += 1;
    }

    return { decision: (puan >= 5 ? 'X' : (o1 < o2 ? '1' : '2')), puan: Math.min(puan, 10), diff };
}

function calculateStandings(matches) {
    leagueTable = {};
    teamSet.forEach(team => { leagueTable[team] = { points: 0, rank: 0, gs: 0, gc: 0, played: 0 }; });

    matches.forEach(m => {
        if (!m.fut && m.sc !== "PENDING") {
            let s = m.sc.split(':');
            let hG = parseInt(s[0]), aG = parseInt(s[1]);
            if (!isNaN(hG) && !isNaN(aG)) {
                leagueTable[m.h].gs += hG;
                leagueTable[m.h].gc += aG;
                leagueTable[m.h].played++;

                leagueTable[m.a].gs += aG;
                leagueTable[m.a].gc += hG;
                leagueTable[m.a].played++;

                if (hG > aG) leagueTable[m.h].points += 3;
                else if (hG < aG) leagueTable[m.a].points += 3;
                else { leagueTable[m.h].points += 1; leagueTable[m.a].points += 1; }
            }
        }
    });

    let sorted = Array.from(teamSet).sort((a,b) => (leagueTable[b].points - leagueTable[a].points) || (leagueTable[b].gs - leagueTable[b].gc) - (leagueTable[a].gs - leagueTable[a].gc) || a.localeCompare(b));
    sorted.forEach((team, index) => {
        leagueTable[team].rank = index + 1;
        leagueTable[team].avgGS = leagueTable[team].played > 0 ? (leagueTable[team].gs / leagueTable[team].played).toFixed(1) : 0;
        leagueTable[team].avgGC = leagueTable[team].played > 0 ? (leagueTable[team].gc / leagueTable[team].played).toFixed(1) : 0;
    });
}

function parseMatches(raw, isFixture) {
    const lines = raw.split(/\r?\n/);
    const results = [];
    const matchRegex = /^(?:.*?\d{2}:\d{2}\s+)?(.+?)\s+-\s+(.+?)(?:\s+(\d{1,2}\s*:\s*\d{1,2}))?\s+(?:(\d{1,2})\s+)?(\d+\.\d+)\s+(\d+\.\d+)\s+(\d+\.\d+)/;

    lines.forEach(line => {
        let cleanLine = line.trim();
        if (!cleanLine) return;
        let match = cleanLine.match(matchRegex);
        if (match) {
            let home = ultraClean(match[1]);
            let away = ultraClean(match[2]);
            let score = match[3] ? match[3].replace(/\s+/g, '') : "PENDING";
            let o1 = parseFloat(match[5]), ox = parseFloat(match[6]), o2 = parseFloat(match[7]);
            if (home && away && !isNaN(o1)) {
                teamSet.add(home); teamSet.add(away);
                let actual = "PENDING";
                if(!isFixture && score !== "PENDING") {
                    let s = score.split(':');
                    actual = (parseInt(s[0]) === parseInt(s[1])) ? 'X' : (parseInt(s[0]) > parseInt(s[1]) ? '1' : '2');
                }
                results.push({ h: home, a: away, sc: score, od: [o1, ox, o2], r: actual, fut: isFixture });
            }
        }
    });
    return results;
}

function superParse() {
    const pastRaw = document.getElementById('pastInput').value;
    const fixtureRaw = document.getElementById('fixtureInput').value;
    teamSet.clear();

    const pastMatches = parseMatches(pastRaw, false);
    calculateStandings(pastMatches);

    const fixtureMatches = parseMatches(fixtureRaw, true);
    allMatches = [...fixtureMatches.reverse(), ...pastMatches];

    renderList();
}

function renderList() {
    const log = document.getElementById('log'); log.innerHTML = "";
    const filterPred = document.getElementById('filter_prediction').value;
    const filterActual = document.getElementById('filter_actual').value;
    const filterFocus = document.getElementById('filter_focus').value;

    // ORAN FİLTRELERİ
    const f1_min = parseFloat(document.getElementById('f1_min').value) || 0;
    const f1_max = parseFloat(document.getElementById('f1_max').value) || 99;
    const fx_min = parseFloat(document.getElementById('fx_min').value) || 0;
    const fx_max = parseFloat(document.getElementById('fx_max').value) || 99;
    const f2_min = parseFloat(document.getElementById('f2_min').value) || 0;
    const f2_max = parseFloat(document.getElementById('f2_max').value) || 99;

    const r_min = parseInt(document.getElementById('rank_min').value) || 1;
    const r_max = parseInt(document.getElementById('rank_max').value) || 100;

    let hits = 0, count = 0;

    allMatches.forEach(m => {
        let hInfo = leagueTable[m.h] || {rank:0, avgGS:0, avgGC:0};
        let aInfo = leagueTable[m.a] || {rank:0, avgGS:0, avgGC:0};

        let dna = solveRadicalDNA(m.od[0], m.od[1], m.od[2], hInfo, aInfo, hInfo.rank, aInfo.rank);

        // SIRALAMA FİLTRESİ
        if (!m.fut && (hInfo.rank < r_min || hInfo.rank > r_max || aInfo.rank < r_min || aInfo.rank > r_max)) return;

        // ORAN FİLTRELEME MANTIĞI
        if (m.od[0] < f1_min || m.od[0] > f1_max) return;
        if (m.od[1] < fx_min || m.od[1] > fx_max) return;
        if (m.od[2] < f2_min || m.od[2] > f2_max) return;

        if (filterPred !== "ALL" && dna.decision !== filterPred) return;

        let isCorrect = (dna.decision === m.r);
        if(!m.fut) { count++; if(isCorrect) hits++; }

        // ---- RENKLENDİRME MANTIĞI ----
        let rowClass, drawBorder = '';
        if (filterActual !== "ALL") {
            // Gerçek sonuç vurgulama aktif: SADECE seçilen sonuç renklenir, diğerleri nötr (renksiz)
            rowClass = (!m.fut && m.r === filterActual) ? 'actual-highlight' : '';
        } else {
            // Normal görünüm
            rowClass = m.fut ? 'future-match' : (filterFocus === "ALL" ? (isCorrect ? 'win' : 'loss') : (m.r === filterFocus ? 'win' : 'loss'));
            drawBorder = (dna.decision === 'X') ? 'draw-highlight' : '';
        }

        let statusText = m.fut ? 'GELECEK' : (filterFocus === "ALL" ? (isCorrect ? 'BAŞARILI' : 'HATALI') : (m.r === filterFocus ? 'HEDEF TUTTU' : 'HEDEF KAÇTI'));

        log.innerHTML += `
            <div class="match-row ${rowClass} ${drawBorder}">
                <div class="col-teams">${m.h} (#${hInfo.rank}) - ${m.a} (#${aInfo.rank})</div>
                <div class="col-score mono">${m.sc==='PENDING'?'?':m.sc}</div>
                <div class="col-goals">Ev V${hInfo.avgGS}/Y${hInfo.avgGC} · Dep V${aInfo.avgGS}/Y${aInfo.avgGC}</div>
                <div class="col-dna">DNA ${dna.puan}/10 · T:<b>${dna.decision}</b> · S:<b>${m.r}</b></div>
                <div class="col-odds">1(${m.od[0]}) X(${m.od[1]}) 2(${m.od[2]})</div>
                <div class="col-status"><span class="status-badge">${statusText}</span></div>
            </div>`;
    });
    document.getElementById('stats').innerText = `DNA BAŞARI İSTATİSTİĞİ: %${count > 0 ? ((hits/count)*100).toFixed(1) : 0} (${hits}/${count})`;
}
</script>
</body>
</html>
